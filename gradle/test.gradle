test {
    // 如需要打印日志 添加 --info
    //:taotao-cloud-microservice:taotao-cloud-sys:taotao-cloud-sys-biz:test --tests "com.taotao.cloud.sys.biz.RegionTests.synchronizationData" --info
    useJUnitPlatform()
    ignoreFailures = true

    testLogging {
        outputs.upToDateWhen { false }
    }

    addTestListener(new TestListener() {
        @Override
        void beforeSuite(TestDescriptor suite) {
            logger.quiet "🚀 [SUITE START] 开始执行测试套件: ${suite.name}"
        }

        @Override
        void afterSuite(TestDescriptor desc, TestResult result) {
            println "Execution test ${result} ${desc}"
            // 套件结束后：打印聚合统计信息
            def status = result.resultType
            def total = result.testCount
            def success = result.successfulTestCount
            def failed = result.failedTestCount
            def skipped = result.skippedTestCount

            logger.quiet "🏁 [SUITE END]   套件: ${suite.name} | 结果: ${status} | 总数: ${total} (成功: ${success}, 失败: ${failed}, 跳过: ${skipped})"
        }

        @Override
        void beforeTest(TestDescriptor testDescriptor) {
            logger.quiet "▶️  [TEST START] 正在运行: ${testDescriptor.className}.${testDescriptor.name}"
        }

        @Override
        void afterTest(TestDescriptor desc, TestResult result) {
            //logger.quiet "Execution test ${desc.name} [${desc.className}] with result; ${result.resultType}"

            // 单个测试结束后：打印具体结果状态和执行时间(如果可用)
            def testName = "${testDescriptor.className}.${testDescriptor.name}"
            def status = result.resultType

            // 简单的耗时计算 (可选，result 对象本身可能不直接暴露毫秒数，视具体 Gradle 版本而定，这里主要打印状态)
            logger.quiet "✅  [TEST END]   测试: ${testName} | 结果: ${status}"

            // 如果测试失败，可以额外打印异常信息（可选）
            if (status == TestResult.ResultType.FAILURE && result.exception) {
                logger.quiet "   ❌ 失败原因: ${result.exception.message}"
            }
        }
    })

    jvmArgs = [
            '-Xshare:off',
            '--enable-preview',
            '--add-exports=java.desktop/sun.font=ALL-UNNAMED',
            '--add-exports=java.base/sun.reflect.generics.tree=ALL-UNNAMED',
            '--add-exports=java.base/sun.net.www.protocol.ftp=ALL-UNNAMED',
            '--add-exports=java.desktop/sun.awt=ALL-UNNAMED',
            '--add-exports=java.desktop/sun.font=ALL-UNNAMED',

            '--add-opens=java.base/java.lang=ALL-UNNAMED',
            '--add-opens=java.base/java.lang.reflect=ALL-UNNAMED',
            '--add-opens=java.base/java.lang.invoke=ALL-UNNAMED',
            '--add-opens=java.base/java.util=ALL-UNNAMED',
            '--add-opens=java.base/sun.net=ALL-UNNAMED',
            '--add-opens=java.base/java.math=ALL-UNNAMED',
            '--add-opens=java.base/sun.reflect.annotation=ALL-UNNAMED',
            '--add-opens=java.base/sun.net=ALL-UNNAMED',
            '--add-opens=java.desktop/sun.awt=ALL-UNNAMED',
            '--add-opens=java.desktop/sun.font=ALL-UNNAMED',
            '--add-opens=jdk.management/com.sun.management.internal=ALL-UNNAMED',
            '--add-opens=java.base/java.lang=ALL-UNNAMED',
            '--add-opens=java.base/java.math=ALL-UNNAMED',
            '--add-opens=java.base/java.util=ALL-UNNAMED',
            '--add-opens=java.base/sun.util.calendar=ALL-UNNAMED',
            '--add-opens=java.base/java.util.concurrent=ALL-UNNAMED',
            '--add-opens=java.base/java.util.concurrent.locks=ALL-UNNAMED',
            '--add-opens=java.base/java.security=ALL-UNNAMED',
            '--add-opens=java.base/jdk.internal.loader=ALL-UNNAMED',
            '--add-opens=java.management/com.sun.jmx.mbeanserver=ALL-UNNAMED',
            '--add-opens=java.base/java.net=ALL-UNNAMED',
            '--add-opens=java.base/sun.nio.ch=ALL-UNNAMED',
            '--add-opens=java.management/java.lang.management=ALL-UNNAMED',
            '--add-opens=jdk.management/com.sun.management.internal=ALL-UNNAMED',
            '--add-opens=java.management/sun.management=ALL-UNNAMED',
            '--add-opens=java.management/java.lang.management=ALL-UNNAMED',
            '--add-opens=jdk.management/com.sun.management.internal=ALL-UNNAMED',
            '--add-opens=java.management/sun.management=ALL-UNNAMED',
            '--add-opens=java.base/java.time=ALL-UNNAMED',
            '--add-opens=java.base/java.util.concurrent=ALL-UNNAMED',
            '--add-opens=java.base/java.util.concurrent.locks=ALL-UNNAMED',
            '--add-opens=java.base/java.security=ALL-UNNAMED',
            '--add-opens=java.base/jdk.internal.loader=ALL-UNNAMED',
            '--add-opens=java.management/com.sun.jmx.mbeanserver=ALL-UNNAMED',
            '--add-opens=java.base/java.net=ALL-UNNAMED',
            '--add-opens=java.base/sun.nio.ch=ALL-UNNAMED',
            '--add-opens=java.base/java.lang=ALL-UNNAMED',
            '--add-opens=java.base/java.math=ALL-UNNAMED',
            '--add-opens=java.base/java.util=ALL-UNNAMED',
            '--add-opens=java.base/sun.util.calendar=ALL-UNNAMED',
            '--add-opens=java.base/sun.net.util=ALL-UNNAMED',
            '--add-opens=java.base/sun.net.util=ALL-UNNAMED'
    ]

    //编译时自动执行jacocoTestReport，生成报告；报告路径build/reports/jacoco/test/html/index.html
    finalizedBy jacocoTestReport // report is always generated after tests run

}

/**
 * clean 命令时删除 logs 目录
 */
tasks.register('cleanOutDir', Delete) {
    delete "${projectDir}/logs"
    delete "${projectDir}/arthas-output"
    delete "${rootDir}/logs"
    delete "${rootDir}/arthas-output"
}
tasks.clean.dependsOn(cleanOutDir)
tasks.build.dependsOn(cleanOutDir)
