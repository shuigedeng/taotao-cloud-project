server:
  port: 33340
  shutdown: graceful
  http2:
    enabled: true
  undertow:
    buffer-size: 2048 #每块buffer的空间大小,越小的空间被利用越充分，buffer会用于服务器连接的IO操作,类似netty的池化内存管理
    direct-buffers: true # 是否分配的直接内存
    #max-http-post-size: -1B # HTTP POST请求最大的大小
    max-cookies: 200 # 允许的最大 cookie 数量
    max-headers: 100 # 允许的最大请求头数量
    threads:
      io: 16 # 设置IO线程数, 它主要执行非阻塞的任务,它们会负责多个连接, 默认设置每个CPU核心一个线程
      worker: 256 # 阻塞任务线程池, 当执行类似servlet请求阻塞操作, undertow会从这个线程池中取得线程,它的值设置取决于系统的负载
    accesslog:
      dir: ${user.home}/logs/${spring.application.name}/undertow # 日志存放目录
      enabled: true # 是否启动日志
      pattern: common # 日志格式
      prefix: "access_log." # 日志文件名前缀
      suffix: log # 日志文件名后缀
  servlet:
    application-display-name: ${spring.application.name}
    #context-path: sys

decorator:
  datasource:
    enabled: true
    datasource-proxy:
      logging: slf4j
      query:
        enable-logging: true
        log-level: debug
        logger-name: net.ttddyy.dsproxy.listener.logging.SLF4JQueryLoggingListener
      slow-query:
        enable-logging: true
        log-level: warn
        logger-name: net.ttddyy.dsproxy.listener.logging.SLF4JQueryLoggingListener
        threshold: 300
      multiline: true
      json-format: false
      count-query: false

jasypt:
  encryptor:
    password: ${TAOTAO_CLOUD_ENCRYPTOR_PASSWORD:taotao-cloud}     # 指定加密密钥，生产环境请放到启动参数里面  -Djasypt.encryptor.password=your-secret
    algorithm: PBEWITHHMACSHA512ANDAES_256     # 指定解密算法，需要和加密时使用的算法一致
    iv-generator-classname: org.jasypt.iv.NoIvGenerator     # 指定initialization vector类型
    property:
      prefix: "ENC@["
      suffix: "]"

redisson:
  client-name: ${spring.application.name}   #在Redis节点里显示的客户端名称。
  #password: taotao-cloud   #用于节点身份验证的密码
  lock-model: auto   #锁的模式.如果不设置, REENTRANT(可重入锁),FAIR(公平锁),MULTIPLE(联锁),REDLOCK(红锁),READ(读锁), WRITE(写锁)
  model: single   #集群模式:SINGLE(单例),SENTINEL(哨兵),MASTERSLAVE(主从),CLUSTER(集群),REPLICATED(云托管)
  codec: "com.zengtengpeng.codec.MyJsonJacksonCodec"   #Redisson的对象编码类是用于将对象进行序列化和反序列化，以实现对该对象在Redis里的读取和存储
  threads: 16   #这个线程池数量被所有RTopic对象监听器，RRemoteService调用者和RExecutorService任务共同共享。
  netty_threads: 32   #这个线程池数量是在一个Redisson实例内，被其创建的所有分布式数据类型和服务，以及底层客户端所一同共享的线程池里保存的线程数量。
  transport_mode: nio   #TransportMode.NIO,TransportMode.EPOLL - 需要依赖里有netty-transport-native-epoll包（Linux） TransportMode.KQUEUE - 需要依赖里有 netty-transport-native-kqueue包（macOS）
  idle-connection-timeout: 1000   #如果当前连接池里的连接数量超过了最小空闲连接数，而同时有连接空闲时间超过了该数值，那么这些连接将会自动被关闭，并从连接池里去掉。时间单位是毫秒
  connect-timeout: 1000   #同任何节点建立连接时的等待超时。时间单位是毫秒
  timeout: 3000   #等待节点回复命令的时间。该时间从命令发送成功时开始计时。
  retry-attempts: 3   #如果尝试达到 retryAttempts（命令失败重试次数） 仍然不能将命令发送至某个指定的节点时，将抛出错误。如果尝试在此限制之内发送成功，则开始启用 timeout（命令等待超时） 计时。
  retry-interval: 1500   #在一条命令发送失败以后，等待重试发送的时间间隔。时间单位是毫秒。
  subscriptions-per-connection: 5   #	每个连接的最大订阅数量。
  ssl-enable-endpoint-identification: true   #开启SSL终端识别能力。
  ssl-provider: jdk   #确定采用哪种方式（JDK或OPENSSL）来实现SSL连接。
  ssl-truststore:
  ssl-truststore-password:
  ssl-keystore:
  ssl-keystore-password:
  lock-watchdog-timeout: 30000   #监控锁的看门狗超时时间单位为毫秒。该参数只适用于分布式锁的加锁请求中未明确使用leaseTimeout参数的情况。如果该看门口未使用lockWatchdogTimeout去重新调整一个分布式锁的lockWatchdogTimeout超时，那么这个锁将变为失效状态。这个参数可以用来避免由Redisson客户端节点宕机或其他原因造成死锁的情况。
  keep-pub-sub-order: true   #通过该参数来修改是否按订阅发布消息的接收顺序出来消息，如果选否将对消息实行并行处理，该参数只适用于订阅发布消息的情况。
  ping-connection-interval: 30000
  keep-alive: false
  tcpNoDelay: false
  referenceEnabled: true
  useScriptCache: false
  minCleanUpDelay: 5
  maxCleanUpDelay: 1800
  attemptTimeout: 10000   #等待获取锁超时时间,-1则是一直等待
  dataValidTime: 1800000
  single_server_config:
    address: "127.0.0.1:6379"     #服务器地址,必填ip:port
    subscription_connection_minimum_idle_size: 1     #用于发布和订阅连接的最小保持连接数（长连接）。Redisson内部经常通过发布和订阅来实现许多功能。长期保持一定数量的发布订阅连接是必须的。
    subscription_connection_pool_size: 50     #用于发布和订阅连接的连接池最大容量。连接池的连接数量自动弹性伸缩。
    connection_minimum_idle_size: 24     #最小保持连接数（长连接）。长期保持一定数量的连接有利于提高瞬时写入反应速度。
    connection_pool_size: 64     #连接池最大容量。连接池的连接数量自动弹性伸缩。
    database: 3     #尝试连接的数据库编号。
    dns_monitoring_interval: 5000     #用来指定检查节点DNS变化的时间间隔。使用的时候应该确保JVM里的DNS数据的缓存时间保持在足够低的范围才有意义。用-1来禁用该功能。

arthas:
  # telnetPort、httpPort为 -1 ，则不listen telnet端口，为 0 ，则随机telnet端口
  # 如果是防止一个机器上启动多个 arthas端口冲突。可以配置为随机端口，或者配置为 -1，并且通过tunnel server来使用arthas。
  # ~/logs/arthas/arthas.log (用户目录下面)里可以找到具体端口日志
  telnetPort: -1
  httpPort: -1
  ip: 0.0.0.0   # 127.0.0.1只能本地访问，0.0.0.0则可网络访问，但是存在安全问题
  agent-id: ${spring.application.name}
  app-name: ${spring.application.name}
  tunnel-server: ws://127.0.0.1:7777/ws

dubbo:
  scan:
    base-packages: com.taotao.cloud.tenant.interfaces.dubbo
  application:
    name: ${spring.application.name}     #当前应用名称
    compiler: javassist     #Java字节码编译器，用于动态类的生成，可选：jdk或javassist
    version: ${ttcVersion}
    owner: 981376577
    architecture: china
    organization: taotao-cloud
    metadata-type: remote
    environment: product
    qos-port: 20883     #禁用qos同一台集群可能会有端口冲突现象
    qos-enable: false
    qos-accept-foreign-ip: true
    logger: slf4j
    shutwait: 3000
    dump-directory: ${user.home}/logs/${spring.application.name}/dubbo/
    #https://cn.dubbo.apache.org/zh-cn/overview/mannual/java-sdk/tasks/security/class-check/
    check-serializable: false
    #STRICT 严格检查，WARN 告警，DISABLE 禁用
    serialize-check-status: DISABLE
    protocol: tri
  registry:
    address: nacos://127.0.0.1:8848
    group: DUBBO_REGISTRY_GROUP
    cluster: CQ
    parameters:
      namespace: 213336af-bf44-45ce-850d-6ae563173799
      cluster-name: CQ
      # 为了在测试时nacos未启动一直阻塞线程
      nacos.retry: 1
      nacos.retry-wait: 1000
      nacos.check: false
      register-ip: 192.168.218.1
    timeout: 15000
    username: nacos
    password: nacos
    version: ${ttcVersion}
    check: false
    register: true
    weight: 10
    subscribe: true
    use-as-config-center: false
    use-as-metadata-center: false
  protocol:
    host: 192.168.218.1
    name: tri
    port: 50053
    ssl-enabled: false
    #accesslog: ${user.home}/logs/${spring.application.name}/dubbo/access.log
    accesslog: true
    #serialization: kryo
    status: server
    payload: 83886080
    threadpool: fixed
    corethreads: 10
    threads: 20
    queues: 200
  provider:
    host: 192.168.218.1
    timeout: 3000
    version: ${ttcVersion}
    threads: 500
    #group: taotao-cloud-tenant-dev
    #delay: 3000     #延时注册服务（毫秒）
    retries: 3
    loadbalance: shortestresponse
    async: true
    accesslog: true
    owner: 981376577
    threadpool: fixed
    threadname: taotao-cloud-tenant-dubbo-provider-executor
  consumer:
    check: false
    timeout: 3000
    loadbalance: shortestresponse
    version: ${ttcVersion}
    threads: 100
    retries: 3
    async: true
    connections: 200
    owner: 981376577
    actives: 10
    cluster: failover
    validation: true
    #group: taotao-cloud-dev
    filter: -connectivity
  module:
    name: ${spring.application.name}
    version: ${ttcVersion}
    owner: 981376577
    organization: taotao-cloud
    background: false
    refer-async: true
    export-async: true
  #monitor:
  #  id: ${spring.application.name}
  #  address: 127.0.0.1:38080
  #  username: admin
  #  password: 123456
  #  group: DUBBO_REGISTRY_GROUP
  #  version: ${ttcVersion}
  metadata-report:
    id: ${spring.application.name}
    address: nacos://127.0.0.1:8848
    username: nacos
    password: nacos
    group: DUBBO_REGISTRY_GROUP
    parameters:
      namespace: 213336af-bf44-45ce-850d-6ae563173799
      cluster-name: CQ
      # 为了在测试时nacos未启动一直阻塞线程
      nacos.retry: 1
      nacos.retry-wait: 1000
      nacos.check: false
    check: false
    timeout: 10000
  config-center:
    check: false
    id: ${spring.application.name}
    address: nacos://127.0.0.1:8848
    username: nacos
    password: nacos
    group: DUBBO_REGISTRY_GROUP
    parameters:
      namespace: 213336af-bf44-45ce-850d-6ae563173799
      # 为了在测试时nacos未启动一直阻塞线程
      nacos.retry: 1
      nacos.retry-wait: 1000
      nacos.check: false
  #tracing:
  #  enabled: true # 默认为false
  #  sampling:
  #    probability: 0.5 # 采样率, 默认是 0.1
  #  propagation:
  #    type: W3C # 传播器类型：W3C/B3 默认是W3C
  #  tracing-exporter:
  #    zipkin-config:
  #      endpoint: http://127.0.0.1:9411/api/v2/spans
  #      connect-timeout: 1s # 建立连接超时时间, 默认为1s
  #      read-timeout: 10s # 传递数据超时时间, 默认为10s
  metrics:
    default: true
    id: ${spring.application.name}
    enable-threadpool: true
    enable-registry: true
    enable-metadata: true
    enable-jvm: true
    enable-rpc: true
    enable-netty: true
    rpc-level: method
    protocol: prometheus
    export-metrics-service: false
    use-global-registry: true
    aggregation:
      enabled: true
      bucketNum: 100
      timeWindowSeconds: 30
      enable-qps: true
      enable-rt: true
      enable-request: true
      enable-rt-pxx: true
    prometheus:
      exporter:
        enabled: true
        enableHttpServiceDiscovery: true
        httpServiceDiscoveryUrl: http://127.0.0.1:18081/prometheus/metrics
      pushgateway:
        enabled: false
    histogram:
      enabled: true

seata:
  enabled: false
  application-id: ${spring.application.name}
  tx-service-group: taotao_cloud_tx_group   # 事务群组（可以每个应用独立取名，也可以使用相同的名字）
  enable-auto-data-source-proxy: true
  use-jdk-proxy: false
  data-source-proxy-mode: AT
  service:
    grouplist:
      SC: 127.0.0.1:8091
    vgroupMapping:
      taotao_cloud_tx_group: SC   # TC 集群（必须与seata-server保持一致）
    disable-global-transaction: false     # 禁用全局事务（默认false）
  config:
    type: nacos
    nacos:
      namespace: taotao-cloud-seata
      server-addr: 127.0.0.1:8848
      group: SEATA_GROUP
      username: nacos
      password: nacos
      data-id: seataServer.properties
  registry:
    type: nacos
    nacos:
      namespace: taotao-cloud-seata
      application: seata-server
      server-addr: 127.0.0.1:8848
      group: SEATA_GROUP
      username: nacos
      password: nacos
      cluster: SC
  client:
    rm:
      async-commit-buffer-limit: 10000       # 异步提交缓存队列长度（默认10000）
      report-retry-count: 5       # 一阶段结果上报TC重试次数（默认5）
      table-meta-check-enable: false       # 自动刷新缓存中的表结构（默认false）
      report-success-enable: true
      saga-branch-register-enable: false
      lock:
        retry-interval: 10         # 校验或占用全局锁重试间隔（默认10ms）
        retry-times: 30         # 校验或占用全局锁重试次数（默认30）
        retry-policy-branch-rollback-on-conflict: true         # 分支事务与其它全局回滚事务冲突时锁策略（优先释放本地锁让回滚成功）
    tm:
      commit-retry-count: 5       # 一阶段全局提交结果上报TC重试次数（默认1次，建议大于1）
      rollback-retry-count: 5       # 一阶段全局回滚结果上报TC重试次数（默认1次，建议大于1）
      degrade-check: false
      degrade-check-period: 2000
      degrade-check-allow-times: 10
    undo:
      data-validation: true       # 二阶段回滚镜像校验（默认true开启）
      log-serialization: jackson       # undo序列化方式（默认jackson 不支持 LocalDateTime）
      only-care-update-columns: true
      log-table: undo_log       # 自定义undo表名（默认undo_log）
  log:
    exception-rate: 100     # 日志异常输出概率（默认100）
  transport:
    shutdown:
      wait: 3
    thread-factory:
      boss-thread-prefix: TaoTaoCloudSysNettyBoss
      worker-thread-prefix: TaoTaoCloudSysNettyServerNIOWorker
      server-executor-thread-prefix: TaoTaoCloudSysNettyServerBizHandler
      share-boss-worker: false
      client-selector-thread-prefix: TaoTaoCloudSysNettyClientSelector
      client-selector-thread-size: 1
      client-worker-thread-prefix: TaoTaoCloudSysNettyClientWorkerThread
    type: TCP
    server: NIO
    heartbeat: true
    serialization: seata
    compressor: none
    enable-client-batch-send-request: true     # 客户端事务消息请求是否批量合并发送（默认true）

rocketmq:
  name-server: http://127.0.0.1:9876
  producer:
    # 发送同一类消息的设置为同一个group，保证唯一
    group: ${spring.application.name}     # 组名称
    #access-key:     # 阿里云购买的rocketmq
    #secret-key:    # 阿里云购买的rocketmq
    # 发送消息超时时间，默认3000
    sendMessageTimeout: 10000
    # 发送消息失败重试次数，默认2
    retryTimesWhenSendFailed: 2
    # 异步消息重试此处，默认2
    retryTimesWhenSendAsyncFailed: 2
    # 消息最大长度，默认1024 * 1024 * 4(默认4M)
    maxMessageSize: 4096
    # 压缩消息阈值，默认4k(1024 * 4)
    compressMessageBodyThreshold: 4096
    # 是否在内部发送失败时重试另一个broker，默认false
    retryNextServer: false
  consumer:
    group: springboot_consumer_group
    # 一次拉取消息最大值，注意是拉取消息的最大值而非消费最大值
    pull-batch-size: 10

spring:
  grpc:
    server:
      port: 9098
      enabled: true
      servlet:
        enabled: false
    client:
      enabled: true
      channels:
        local:
          address: static://localhost:9098
          enableKeepAlive: true
          idle-timeout: 60s
        #laokou-common-grpc:
        #  address: discovery://laokou-common-grpc
        #  enable-keep-alive: true
        #  idle-timeout: 60s
  http:
    clients:
      connect-timeout: 30s
      read-timeout: 30s
    serviceclient:
      taotao-cloud-sys:
        base-url: lb://taotao-cloud-sys
        connectTimeout: 30s
        readTimeout: 30s
        defaultHeader:
          Authorization: "Bearer 123"
      stackoverflow:
        base-url: https://api.stackexchange.com/2.3
        connectTimeout: 30s
        readTimeout: 30s
        defaultHeader:
          Accept: "application/json"
          Accept-Encoding: "gzip"
      github:
        base-url: https://api.github.com
        connectTimeout: 30s
        readTimeout: 30s
        defaultHeader:
          Authorization: "Bearer 123"
          X-GitHub-Api-Version: "2022-11-28"
  autoconfigure:
    exclude:
      #此处排除掉此配置类  是因为在走api请求或者静态资源请求的时候会走FunctionHandlerMapping 导致出现静态资源获取不到
      - org.springframework.cloud.function.web.mvc.ReactorAutoConfiguration
  task:
    execution:
      mode: FORCE
      thread-name-prefix: ttc-tenant-task-
      pool:
        core-size: 16
        max-size: 200
        queue-capacity: 500
        allow-core-thread-timeout: true
        keep-alive: 60s
  threads:
    virtual:
      #1.Tomcat将使用虚拟线程来处理HTTP请求。这意味着处理Web请求的应用程序代码（例如控制器中的方法）将在虚拟线程上运行。
      #2.调用@Async方法时，SpringMVC的异步请求处理和SpringWebFlux的阻塞执行支持现在将利用虚拟线程
      #3.标记有@Scheduled的方法将在虚拟线程上运行
      enabled: true
  config:
    import:
      # 使用 optional: 前缀，即使nacos不可用也能启动
      - optional:nacos:${spring.application.name}.yaml
      #- optional:nacos:${spring.application.name}.${spring.cloud.nacos.config.file-extension}
      #- optional:nacos:shared-config.yaml
    activate:
      on-profile: dev
  lifecycle:
    timeout-per-shutdown-phase: 30s
  thymeleaf:
    mode: HTML
    prefix: classpath:/static/
    suffix: .html
    encoding: UTF-8
    cache: false
    enabled: true
  main:
    allow-circular-references: false
    allow-bean-definition-overriding: false
    banner-mode: console
    register-shutdown-hook: true
    cloud-platform: none
    web-application-type: servlet
  application:
    name: taotao-cloud-tenant
    admin:
      enabled: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  web:
    resources:
      # pro环境关闭
      add-mappings: true
  mvc:
    servlet:
      load-on-startup: 1
    format:
      date-time: yyyy-MM-dd HH:mm:ss
      date: yyyy-MM-dd
      time: HH:mm:ss
    dispatch-trace-request: true
    dispatch-options-request: true
    log-request-details: true
    log-resolved-exception: true
  servlet:
    multipart:
      enabled: true
      file-size-threshold: 2KB
      max-file-size: 200MB
      max-request-size: 200MB
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    #url: jdbc:mysql://127.0.0.1:13306/${spring.application.name}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&rewriteBatchedStatements=true&zeroDateTimeBehavior=convertToNull&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&allowMultiQueries=true&autoReconnect=true&queryInterceptors=brave.mysql8.TracingQueryInterceptor&exceptionInterceptors=brave.mysql8.TracingExceptionInterceptor
    #driver-class-name: com.mysql.cj.jdbc.Driver
    #url: jdbc:p6spy:mysql://127.0.0.1:13306/${spring.application.name}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&rewriteBatchedStatements=true&zeroDateTimeBehavior=convertToNull&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&allowMultiQueries=true&autoReconnect=true&rewriteBatchedStatements=true
    #driver-class-name: com.p6spy.engine.spy.P6SpyDriver
    url: jdbc:mysql://127.0.0.1:3306/${spring.application.name}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&rewriteBatchedStatements=true&zeroDateTimeBehavior=convertToNull&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&allowMultiQueries=true&autoReconnect=true&useCursorFetch=true&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
    hikari:
      auto-commit: true # 从池返回的连接的默认自动提交行为 默认true 是否自动提交，默认true
      connection-timeout: 1000 # 客户端等待连接池的最大毫秒数 从连接池获取连接的超时时间，默认30s
      idle-timeout: 180000 # 允许连接在连接池中空闲的最大时间（毫秒） 连接空闲时间，当最小连接数 < 最大连接数生效。默认10min
      login-timeout: 5
      validation-timeout: 3000   # 连接测试活动的最大时间量 检验连接是否有效的超时时间，默认5s
      max-lifetime: 1800000  # 池中关闭连接后的最长生命周期 连接最大存活时间，默认30min。需要小于数据库wait_timeout，超过这个时间未使用连接都会关闭。
      read-only: false #是否只读，默认false
      connection-test-query: SELECT 1 #检测连接是否可用的sql,如果为空使用ping，否则使用这个sql
      maximum-pool-size: 200 #最大连接数，默认10
      minimum-idle: 10 #//最小连接数，默认10
      pool-name: DatebookHikariCP
      register-mbeans: true #是否注册MBean
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 250
    dynamic:
      enabled: false
      datasource:
        master:
          type: com.zaxxer.hikari.HikariDataSource
          url: jdbc:p6spy:mysql://${TAOTAO_CLOUD_MYSQL_HOST:127.0.0.1}:${TAOTAO_CLOUD_MYSQL_PORT:3306}/${spring.application.name}?useUnicode=true&rewriteBatchedStatements=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
          username: ${TAOTAO_CLOUD_MYSQL_USERNAME:root}
          password: ${TAOTAO_CLOUD_MYSQL_PASSWORD:123456}
          driver-class-name: com.p6spy.engine.spy.P6SpyDriver
          hikari:
            is-auto-commit: true
            connection-timeout: 30000
            idle-timeout: 25000
            validation-timeout: 3000
            max-lifetime: 50000
            is-read-only: false
            connection-test-query: SELECT 1
            max-pool-size: 15
            min-idle: 10
  jpa:
    database: mysql
    database-platform: mysql
    show-sql: false # 生产环境不显示SQL
    open-in-view: false
    generate-ddl: true # 关闭DDL生成
    hibernate:
      #create：每次运行程序时，都会重新创建表，故而数据会丢失
      #create-drop：每次运行程序时会先创建表结构，然后程序结束时清空表
      #update：每次运行程序，没有表时会创建表，如果对象发生改变会更新表结构，原有数据不会清空，只会更新（推荐使用）
      #validate：运行程序会校验数据于数据库的字段类型是否相同，字段不同会报错
      #none：禁用DDL处理
      ddl-auto: update # 不执行DDL
      naming:
        implicit-strategy: org.springframework.boot.hibernate.SpringImplicitNamingStrategy
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    properties:
      eclipselink:
        logging:
          level:
            sql: FINE
      javax:
        persistence:
          sharedCache:
            mode: ENABLE_SELECTIVE
      hibernate:
        eclipselink.logging.level.sql: FINE
        hbm2ddl.auto: update
        use_sql_comments: true
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true #输出sql语句 此种方式是直接通过System.out方式进行输出，并且还不会记录预处理语句的参数；不推荐此做法。
        show_sql: false
        generate_statistics: false
        #cache:
        #  use_query_cache: true
        #  use_second_level_cache: true
        #  region:
        #    factory_class: 二级缓存class
        javax:
          cache:
            missing_cache_strategy: create
        temp:
          use_jdbc_metadata_defaults: false
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 1
      #password: ${TAOTAO_CLOUD_REDIS_PASSWORD:taotao-cloud}
      connect-timeout: 60s
      #sentinel:
      #  master:
      #  nodes:
      #cluster:
      #  nodes: 127.0.0.1:6381,127.0.0.1:6382,127.0.0.1:6383,127.0.0.1:6384,127.0.0.1:6385,127.0.0.1:6386
      #  max-redirects: 3
      client-type: lettuce
      lettuce:
        pool:
          max-active: 1500
          max-wait: 60000
          max-idle: 500
          min-idle: 100
      redisson:
        config: |
          singleServerConfig:
            # 连接空闲超时，单位：毫秒
            idleConnectionTimeout: 10000
            # 连接超时，单位：毫秒
            connectTimeout: 10000
            # 命令等待超时，单位：毫秒
            timeout: 3000
            # 命令失败重试次数,如果尝试达到 retryAttempts（命令失败重试次数） 仍然不能将命令发送至某个指定的节点时，将抛出错误。
            # 如果尝试在此限制之内发送成功，则开始启用 timeout（命令等待超时） 计时。
            retryAttempts: 3
            # 命令重试发送时间间隔，单位：毫秒
            retryInterval: 1500
            # 密码，没有设置密码时，需要注释掉，否则会报错
            password: taotao-cloud
            # 单个连接最大订阅数量
            subscriptionsPerConnection: 5
            # 客户端名称
            clientName: "taotao-cloud-redis-client"
            # 节点地址
            address: "redis://127.0.0.1:6379"
            # 发布和订阅连接的最小空闲连接数
            subscriptionConnectionMinimumIdleSize: 1
            # 发布和订阅连接池大小
            subscriptionConnectionPoolSize: 50
            # 最小空闲连接数
            connectionMinimumIdleSize: 32
            # 连接池大小
            connectionPoolSize: 64
            # 数据库编号
            database: 1
            # DNS监测时间间隔，单位：毫秒
            dnsMonitoringInterval: 5000
          # 线程池数量,默认值: 当前处理核数量 * 2
          threads: 0
          # Netty线程池数量,默认值: 当前处理核数量 * 2
          nettyThreads: 0
          # 编码
          codec: !<org.redisson.codec.JsonJackson3Codec> {}
          # 传输模式
          transportMode : "NIO"
          # 配置看门狗的默认超时时间为30s，这里改为 10s
          lockWatchdogTimeout: 10000
  kafka:
    enabled: true
    bootstrap-servers: 127.0.0.1:9092
    producer:
      # 消息发送重试次数
      retries: 1
      # 当有多个消息需要被发送到同一个分区时，生产者会把它们放在同一个批次里。该参数指定了一个批次可以使用的内存大小，按照字节数计算。
      batch-size: 16384 #批量大小
      buffer-memory: 33554432 # 生产者内存缓冲区的大小
      #transaction-id-prefix: tx_1 #开启事务，必须在开启了事务的方法中发送，否则报错
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      #key-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      ## 值的反序列化方式（建议使用Json，这种序列化方式可以无需额外配置传输实体类）
      #value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      # acks=0 ： 生产者在成功写入消息之前不会等待任何来自服务器的响应。
      # acks=1 ： 只要集群的首领节点收到消息，生产者就会收到一个来自服务器成功响应。
      # acks=all ：只有当所有参与复制的节点全部收到消息时，生产者才会收到一个来自服务器的成功响应。
      # 开启事务时，必须设置为all
      acks: 0 #应答级别:多少个分区副本备份完成时向生产者发送ack确认(可选0、1、all/-1)
      compression-type: gzip
      properties:
        linger.ms: 100 #提交延迟
        partitioner.class: org.apache.kafka.clients.producer.RoundRobinPartitioner #指定分区器
    consumer:
      group-id: testGroup #默认的消费组ID
      # 自动提交的时间间隔 在spring boot 2.X 版本中这里采用的是值的类型为Duration 需要符合特定的格式，如1S,1M,2H,5D
      #auto-commit-interval: 2s
      # 该属性指定了消费者在读取一个没有偏移量的分区或者偏移量无效的情况下该作何处理：
      # earliest：当各分区下有已提交的offset时，从提交的offset开始消费；无提交的offset时，从头开始消费分区的记录
      # latest：当各分区下有已提交的offset时，从提交的offset开始消费；无提交的offset时，消费新产生的该分区下的数据（在消费者启动之后生成的记录）
      # none：当各分区都存在已提交的offset时，从提交的offset开始消费；只要有一个分区不存在已提交的offset，则抛出异常
      auto-offset-reset: latest
      # 是否自动提交偏移量，默认值是true，为了避免出现重复数据和数据丢失，可以把它设置为false，然后手动提交偏移量
      enable-auto-commit: false
      #max-poll-records: 500 #单次拉取消息的最大条数
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      #key-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      ## 值的反序列化方式（建议使用Json，这种序列化方式可以无需额外配置传输实体类）
      #value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      # 这个参数定义了poll方法最多可以拉取多少条消息，默认值为500。如果在拉取消息的时候新消息不足500条，那有多少返回多少；如果超过500条，每次只返回500。
      # 这个默认值在有些场景下太大，有些场景很难保证能够在5min内处理完500条消息，
      # 如果消费者无法在5分钟内处理完500条消息的话就会触发reBalance,
      # 然后这批消息会被分配到另一个消费者中，还是会处理不完，这样这批消息就永远也处理不完。
      # 要避免出现上述问题，提前评估好处理一条消息最长需要多少时间，然后覆盖默认的max.poll.records参数
      # 注：需要开启BatchListener批量监听才会生效，如果不开启BatchListener则不会出现reBalance情况
      max-poll-records: 3
      properties:
        spring:
          json:
            trusted:
              packages: "*"
        session:
          timeout:
            ms: 120000 # 消费会话超时时间（超过这个时间 consumer 没有发送心跳，就会触发 rebalance 操作）
        request:
          timeout:
            ms: 18000 # 消费请求的超时时间
    properties:
      # 两次poll之间的最大间隔，默认值为5分钟。如果超过这个间隔会触发reBalance
      max:
        poll:
          interval:
            ms: 600000
      # 当broker多久没有收到consumer的心跳请求后就触发reBalance，默认值是10s
      session:
        timeout:
          ms: 10000
    listener:
      # 在侦听器容器中运行的线程数，一般设置为 机器数*分区数
      concurrency: 4
      # 自动提交关闭，需要设置手动消息确认
      ack-mode: manual_immediate
      # 消费监听接口监听的主题不存在时，默认会报错，所以设置为false忽略错误
      missing-topics-fatal: false
      # 两次poll之间的最大间隔，默认值为5分钟。如果超过这个间隔会触发reBalance
      poll-timeout: 60s
      type: batch #设置批量消费
