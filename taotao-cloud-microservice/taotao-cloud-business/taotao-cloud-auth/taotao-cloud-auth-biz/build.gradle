application {
    //指定应用程序的入口点（主类）
    mainClass = "com.taotao.cloud.auth.biz.TaoTaoCloudAuthApplication"
    applicationName = "taotao-cloud-auth"
}
description = "认证模块biz"

configurations {
    configureEach {
        resolutionStrategy.cacheChangingModulesFor 0, "seconds"
        resolutionStrategy.cacheDynamicVersionsFor 0, "seconds"


        //implementation('com.alibaba:fastjson'){
        //    version{
        //        strictly("1.2.12")
        //    }
        //}
        //或者简写为 force 的优先级会比较高，会覆盖 strictly 策略
        //implementation 'com.alibaba:fastjson:2.0.52!!'

        resolutionStrategy {
            force "org.codehaus.groovy:groovy:3.0.25"
            force 'org.antlr:antlr4:4.13.2'
            force 'net.minidev:json-smart:2.6.0'
            //todo 临时使用
            force "io.opentelemetry:opentelemetry-api-incubator:1.59.0-alpha"
            force 'org.bouncycastle:bcprov-jdk18on:1.82'
            force 'org.bouncycastle:bcpkix-jdk18on:1.82'
            force 'org.bouncycastle:bcutil-jdk18on:1.82'
            force 'org.webjars.npm:csstype:3.1.3'
            force 'org.webjars.npm:postcss:8.5.6'
            force 'org.webjars.npm:nanoid:5.1.6'

            force 'org.webjars.bower:jquery:3.7.1'
            force 'org.webjars.npm:magic-string:0.30.21'
            force 'org.webjars.npm:estree-walker:3.0.3'
            force 'org.webjars.npm:source-map-js:1.2.1'
            force 'org.webjars.npm:entities:7.0.1'
            force 'org.webjars.npm:picocolors:1.1.1'
            force 'org.webjars.npm:jridgewell__sourcemap-codec:1.5.5'
            force 'org.webjars.npm:types__estree:1.0.8'
        }

        //exclude group: "log4j", module: "log4j"
        //exclude group: "log4j", module: "slf4j-simple"
        //exclude group: "org.slf4j", module: "slf4j-log4j12"
        //exclude group: "org.apache.logging.log4j", module: "log4j-slf4j-impl"
        //exclude group: "org.apache.logging.log4j", module: "log4j-to-slf4j"
        //exclude group: "org.apache.logging.log4j", module: "log4j-api"
        //exclude group: "org.springframework.boot", module: "spring-boot-starter-tomcat"
        exclude group: "org.springframework.boot", module: "spring-boot-starter-undertow"
        exclude group: "commons-logging", module: "commons-logging"
        exclude group: "org.bouncycastle", module: "bcprov-jdk15on"
        exclude group: "org.bouncycastle", module: "bcpkix-jdk15on"
        exclude group: "org.bouncycastle", module: "bcutil-jdk15on"
    }
}
